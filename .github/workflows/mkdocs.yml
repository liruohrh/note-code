name: Deploy Notes to GitHub Pages

on:
  # push:
  #   branches:
  #     - master
  workflow_dispatch: # 支持手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史，用于显示最后更新时间

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mkdocs-material

      - name: Install dependencies
        run: pip install mkdocs-material mkdocs-glightbox mkdocs-git-revision-date-localized-plugin

      - name: Build
        run: |
          ./.scripts/mkdocs/build.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/www/site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
