name: Deploy Quartz site to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - site

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout site branch
        uses: actions/checkout@v6
        with:
          ref: site
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Quartz plugins
        uses: actions/cache@v5
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-

      - name: Install Dependencies
        run: npm ci

      - name: Install Quartz plugins
        run: npx quartz plugin install

      # 不知道为什么 git arhive 虽然也可以拉取 master 到 content，但是 quartz 就是找不到，明明 ls 查看文件是存在的
      # git archive --format=tar origin/master | tar -xf - -C content
      - name: Export master branch into content
        run: |
          rm -rf content
          git fetch origin master
          git worktree add content origin/master

      - name: Build Quartz
        run: |
          npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
